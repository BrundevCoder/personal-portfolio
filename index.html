<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>brundevcoder | Portolfio</title>
</head>
<body>
  
  <header>

    <div class="header-block">
      <span class="myName">brundevcoder</span>
    </div>

    <div class="header-block">
      <button class="hamburger-menu">&#9776;</button>
    </div>

  </header>

  <main>
    <section class="about-me sec">
       <h2 class="sec-title">About Me:</h2>

       <div class="about-me-para-container">
        <p>Hello There! I'm Bruno, a 14y old programmer, who loves to build things on the internet</p>
        <p>Also, I'm from <span class="highlhited-word">Portugal</span>, a small country in Europe, and I'm a <span class="highlhited-word">Hack Clubber</span>!</p>
        <p>Explore <span class="highlhited-word">this website</span> to know me better :D</p>
       </div>
    </section>

    <section class="programming-languages-sec sec">
      <h2 class="sec-title">Languages I Know:</h2>

      <div class="languages-grid">

        <div class="language-card">
          <img class="language-img" src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/python/python-original.svg" alt="Python symbol">
          <p class="language-name">Python</p>
        </div>

        <div class="language-card">
          <img class="language-img" src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/html5/html5-original.svg" alt="HTML symbol">
          <p class="language-name">HTML</p>
        </div>

        <div class="language-card">
          <img class="language-img" src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/javascript/javascript-original.svg" alt="JavaScript symbol">
          <p class="language-name">JavaScript (JS)</p>
        </div>

        <div class="language-card">
          <img class="language-img" src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/css3/css3-original.svg" alt="CSS symbol">
          <p class="language-name">CSS</p>
        </div>

      </div>
    </section>
  </main>

</body>
</html>
